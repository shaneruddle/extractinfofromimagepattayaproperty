<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screenshot Info Extractor</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <h1>Extract Contact Details</h1>
        <p>Upload a screenshot, tap extract, and review detected info.</p>
      </header>

      <section class="panel">
        <label class="upload" for="imageInput">
          <span>Choose Screenshot</span>
          <input id="imageInput" type="file" accept="image/*" />
        </label>
        <img id="previewImage" class="preview hidden" alt="Screenshot preview" />
        <button id="extractBtn" class="extract" type="button" disabled>Extract</button>
        <p id="status" class="status">Select an image to begin.</p>
      </section>

      <section class="panel results" aria-live="polite">
        <div class="field">
          <label for="nameField">Name</label>
          <input id="nameField" type="text" placeholder="Detected name" />
        </div>
        <div class="field">
          <label for="phoneField">Mobile</label>
          <input id="phoneField" type="text" placeholder="Detected mobile" />
        </div>
        <div class="field">
          <label for="emailField">Email</label>
          <input id="emailField" type="text" placeholder="Detected email" />
        </div>
        <div class="field">
          <label for="summaryField">Other Info Summary</label>
          <textarea id="summaryField" rows="5" placeholder="Other useful text from screenshot"></textarea>
        </div>
        <p id="confidenceWarning" class="warning hidden"></p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
